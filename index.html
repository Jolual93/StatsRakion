<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a84b;--gold-bright:#f0d070;--gold-dim:#7a6030;--dark:#1a1510;--panel:#0d0a07;--border:#3d2e18;--text-dim:#7a6030;--red:#cc3333;--green:#44aa44}
.game-wrap{background:var(--dark);font-family:var(--font-sans);padding:10px;min-height:500px}
.title-bar{text-align:center;color:var(--gold-bright);font-size:13px;font-weight:500;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px;letter-spacing:1px}
.char-tabs{display:flex;gap:4px;margin-bottom:8px;justify-content:center;flex-wrap:wrap}
.char-tab{padding:4px 10px;border:1px solid var(--border);background:var(--panel);color:var(--text-dim);font-size:11px;cursor:pointer;border-radius:3px;transition:all 0.15s}
.char-tab.active{background:#2a1e08;color:var(--gold-bright);border-color:var(--gold-dim)}
.main-layout{display:grid;grid-template-columns:190px 1fr 190px;gap:6px;align-items:start}
.stats-col{display:flex;flex-direction:column;gap:3px}
.stat-block{border-bottom:1px solid #1e1508;padding-bottom:3px;margin-bottom:1px}
.stat-top{display:flex;justify-content:space-between;align-items:center;padding:1px 2px}
.stat-label{color:var(--text-dim);font-size:10px}
.stat-val{color:var(--gold-bright);font-size:11px;font-weight:500;min-width:46px;text-align:right}
.stat-controls{display:flex;align-items:center;gap:3px;padding:2px 2px}
.alloc-btn{width:16px;height:16px;background:#2a1e08;border:1px solid var(--gold-dim);color:var(--gold);font-size:12px;cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;padding:0}
.alloc-btn:hover{background:#3a2808;color:var(--gold-bright)}
.alloc-btn:disabled{opacity:0.3;cursor:not-allowed}
.alloc-input{width:34px;background:#0d0a07;border:1px solid var(--border);color:var(--gold);font-size:10px;text-align:center;padding:1px 2px;border-radius:2px;-moz-appearance:textfield}
.alloc-input::-webkit-outer-spin-button,.alloc-input::-webkit-inner-spin-button{-webkit-appearance:none}
.alloc-label{color:var(--text-dim);font-size:9px;flex:1;text-align:center}
.bar-wrap{padding:0 2px;margin-top:1px}
.bar-outer{height:4px;background:#0d0a07;border:1px solid var(--border);border-radius:1px;overflow:hidden}
.bar-inner{height:100%;background:linear-gradient(90deg,#7a5010,#d4902a);transition:width 0.25s}
.center-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.char-img-wrap{width:140px;height:210px;background:#000;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.char-img-wrap img{width:100%;height:100%;object-fit:contain;display:block}
.char-name-badge{background:#1a1205;border:1px solid var(--gold-dim);border-radius:3px;padding:3px 10px;color:var(--gold-bright);font-size:12px;font-weight:500;text-align:center;width:100%}
.pts-panel{background:#0d0a07;border:1px solid var(--border);border-radius:3px;padding:5px 8px;width:100%}
.pts-row{display:flex;justify-content:space-between;font-size:10px;margin:2px 0}
.pts-label{color:var(--text-dim)}
.pts-num{font-weight:500;color:var(--gold)}
.pts-num.green{color:var(--green)}
.pts-num.red{color:var(--red)}
.lvl-control{display:flex;align-items:center;gap:4px;width:100%}
.lvl-btn{width:22px;height:22px;background:#2a1e08;border:1px solid var(--gold-dim);color:var(--gold-bright);font-size:14px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center}
.lvl-input{flex:1;background:#0d0a07;border:1px solid var(--border);color:var(--gold-bright);font-size:13px;text-align:center;padding:2px 0;border-radius:3px;font-weight:500}
.reset-btn{background:#1a0e06;border:1px solid var(--gold-dim);color:var(--text-dim);font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;display:block;width:100%}
.reset-btn:hover{color:var(--gold-bright)}
</style>

<div class="game-wrap">
  <div class="title-bar">STATS DEL PERSONAJE</div>
  
  <div id="musicPlayer" style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:#0d0a07;border:1px solid #3d2e18;border-radius:3px;margin-bottom:8px">
    <button id="prevBtn" style="background:#2a1e08;border:1px solid #7a6030;color:#c8a84b;width:20px;height:20px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">&#9664;</button>
    <button id="playBtn" style="background:#2a1e08;border:1px solid #7a6030;color:#f0d070;width:20px;height:20px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">&#9646;&#9646;</button>
    <button id="nextBtn" style="background:#2a1e08;border:1px solid #7a6030;color:#c8a84b;width:20px;height:20px;border-radius:2px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center">&#9654;</button>
    <span id="trackName" style="color:#c8a84b;font-size:10px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">Pista1.mp3</span>
    <input type="range" id="volSlider" min="0" max="100" value="40" style="width:60px;accent-color:#c8a84b">
    <span style="color:#7a6030;font-size:9px">&#9834;</span>
  </div>
  <div class="char-tabs" id="charTabs"></div>
  <div class="main-layout">
    <div class="stats-col" id="leftStats"></div>
    <div class="center-col">
      <div class="char-img-wrap"><img id="charImg" src="" alt=""></div>
      <div class="char-name-badge" id="charNameBadge">Warrior</div>
      <div class="lvl-control">
        <button class="lvl-btn" id="lvlDown">−</button>
        <input class="lvl-input" type="number" id="lvlInput" min="1" max="99" value="1">
        <button class="lvl-btn" id="lvlUp">+</button>
      </div>
      <div class="pts-panel">
        <div class="pts-row"><span class="pts-label">Puntos de Nivel</span><span class="pts-num" id="ptTotal">0</span></div>
        <div class="pts-row"><span class="pts-label">Puntos Usados</span><span class="pts-num" id="ptUsed">0</span></div>
        <div class="pts-row"><span class="pts-label">Puntos Libres</span><span class="pts-num green" id="ptFree">0</span></div>
      </div>
      <button class="reset-btn" id="resetBtn">↺ Resetear puntos</button>
    </div>
    <div class="stats-col" id="rightStats"></div>
  </div>
</div>

const maxVal={"Atq. Básico":300,"Atq. Lejano":300,"Atq. Especial":300,"Atq. de Llave":300,"Dest. de Cell":100,"Energía":500,"Armadura":500,"Vel. de Ataque":115,"Vel. de Mov.":12,"Pts. Máx Cell":10000};
const leftKeys=["Atq. Básico","Atq. Lejano","Atq. Especial","Atq. de Llave","Dest. de Cell"];
const rightKeys=["Energía","Armadura","Vel. de Ataque","Vel. de Mov.","Pts. Máx Cell"];
const charColors={Warrior:"#aaa",Mago:"#7F77DD",Ninja:"#1D9E75",Arquera:"#cc4444",Blacksmith:"#BA7517"};

let curChar="Warrior",lvl=1,alloc={};
Object.keys(incr).forEach(s=>alloc[s]=0);

function totalPts(){return lvl<=1?0:(lvl-1)*3}
function usedPts(){return Object.keys(alloc).reduce((a,s)=>a+alloc[s],0)}
function freePts(){return totalPts()-usedPts()}

function fmt(v,s){
  if(s==="Vel. de Mov.")return v.toFixed(3);
  if(s==="Vel. de Ataque")return v.toFixed(2);
  if(s==="Pts. Máx Cell")return v.toLocaleString("es");
  return v.toFixed(2);
}
function getTotal(s){return chars[curChar].stats[s]+alloc[s]*incr[s]}
function barPct(s){return Math.min(100,Math.round((getTotal(s)/maxVal[s])*100))}

function makeStatBlock(s,side){
  const tot=getTotal(s);
  const used=alloc[s];
  const pct=barPct(s);
  const canAdd=freePts()>0&&used<MAX_PER_STAT;
  const canSub=used>0;
  const valStr=fmt(tot,s);
  if(side==="left"){
    return`<div class="stat-block">
      <div class="stat-top"><span class="stat-label">${s}</span><span class="stat-val">${valStr}</span></div>
      <div class="stat-controls">
        <button class="alloc-btn" data-s="${s}" data-d="-1"${canSub?"":" disabled"}>−</button>
        <input class="alloc-input" type="number" min="0" max="${MAX_PER_STAT}" value="${used}" data-s="${s}">
        <span class="alloc-label">/${MAX_PER_STAT}</span>
        <button class="alloc-btn" data-s="${s}" data-d="1"${canAdd?"":" disabled"}>+</button>
      </div>
      <div class="bar-wrap"><div class="bar-outer"><div class="bar-inner" style="width:${pct}%"></div></div></div>
    </div>`;
  } else {
    return`<div class="stat-block">
      <div class="stat-top"><span class="stat-val">${valStr}</span><span class="stat-label">${s}</span></div>
      <div class="stat-controls" style="flex-direction:row-reverse">
        <button class="alloc-btn" data-s="${s}" data-d="-1"${canSub?"":" disabled"}>−</button>
        <input class="alloc-input" type="number" min="0" max="${MAX_PER_STAT}" value="${used}" data-s="${s}">
        <span class="alloc-label">/${MAX_PER_STAT}</span>
        <button class="alloc-btn" data-s="${s}" data-d="1"${canAdd?"":" disabled"}>+</button>
      </div>
      <div class="bar-wrap"><div class="bar-outer"><div class="bar-inner" style="width:${pct}%"></div></div></div>
    </div>`;
  }
}

function render(){
  document.getElementById("charNameBadge").textContent=curChar;
  document.getElementById("charImg").src=charImgs[curChar]||"";
  document.getElementById("lvlInput").value=lvl;
  const tp=totalPts(),up=usedPts(),fp=freePts();
  document.getElementById("ptTotal").textContent=tp;
  document.getElementById("ptUsed").textContent=up;
  const fpEl=document.getElementById("ptFree");
  fpEl.textContent=fp;
  fpEl.className="pts-num "+(fp<0?"red":fp>0?"green":"");
  document.getElementById("leftStats").innerHTML=leftKeys.map(s=>makeStatBlock(s,"left")).join("");
  document.getElementById("rightStats").innerHTML=rightKeys.map(s=>makeStatBlock(s,"right")).join("");
  document.querySelectorAll(".alloc-btn").forEach(b=>b.addEventListener("click",e=>{
    const s=e.currentTarget.dataset.s,d=parseInt(e.currentTarget.dataset.d);
    if(d>0&&freePts()>0&&alloc[s]<MAX_PER_STAT){alloc[s]++;render();}
    else if(d<0&&alloc[s]>0){alloc[s]--;render();}
  }));
  document.querySelectorAll(".alloc-input").forEach(inp=>inp.addEventListener("change",e=>{
    const s=e.target.dataset.s;
    let v=Math.max(0,Math.min(MAX_PER_STAT,parseInt(e.target.value)||0));
    const other=Object.keys(alloc).filter(x=>x!==s).reduce((a,x)=>a+alloc[x],0);
    v=Math.min(v,Math.max(0,totalPts()-other));
    alloc[s]=v;render();
  }));
}

function clampAlloc(){
  const tp=totalPts();let used=0;
  Object.keys(alloc).forEach(s=>{alloc[s]=Math.max(0,Math.min(alloc[s],tp-used,MAX_PER_STAT));used+=alloc[s];});
}
